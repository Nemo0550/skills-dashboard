<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Skills Dashboard — Claude Cowork</title>
<style>
:root{
  --bg:#1a0a2e; --fg:#fffde7; --pink:#ff2d78; --pink-deep:#c2006e;
  --yellow:#ffeb3b; --accent:#D97757; --card:#fffde7; --ink:#000;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--fg);
  font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.06) 1px,transparent 0);
  background-size:32px 32px; min-height:100vh; padding:0 0 64px;
}
.container{max-width:1180px;margin:0 auto;padding:0 20px}
header{padding:32px 0 0;text-align:center}
.claude-logo{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:20px;color:var(--accent)}
.claude-sparkle{width:30px;height:30px}
.badge{display:inline-flex;align-items:center;gap:8px;margin:18px 0 0;background:var(--yellow);color:#000;
  border:3px solid #000;border-radius:999px;padding:7px 16px;font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;box-shadow:3px 3px 0 #000}
.badge-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 0 var(--pink);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,45,120,.6)}70%{box-shadow:0 0 0 8px rgba(255,45,120,0)}100%{box-shadow:0 0 0 0 rgba(255,45,120,0)}}
h1{font-size:clamp(2.4rem,9vw,3.6rem);font-weight:900;line-height:1.02;letter-spacing:-.02em;margin:18px 0 0;color:#fff;text-shadow:4px 4px 0 #000}
h1 em{font-style:italic;color:var(--yellow)}
.subtitle{max-width:620px;margin:16px auto 0;color:rgba(255,253,231,.72);font-size:clamp(.95rem,2.6vw,1.05rem);line-height:1.5;padding:0 6px}
.stats{display:flex;justify-content:center;gap:clamp(18px,6vw,56px);flex-wrap:wrap;margin:34px 0 0}
.stat{text-align:center}
.stat-num{font-size:clamp(2rem,8vw,2.75rem);font-weight:900;color:var(--yellow);text-shadow:3px 3px 0 #000;line-height:1}
.stat-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,253,231,.6);margin-top:6px}
.search-wrap{margin:36px auto 0;max-width:620px;position:relative}
.search-wrap svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);opacity:.5}
#search{width:100%;background:rgba(255,253,231,.04);border:3px solid var(--pink);border-radius:12px;
  padding:15px 18px 15px 48px;color:var(--fg);font-size:15px;outline:none}
#search::placeholder{color:rgba(255,253,231,.4)}
#search:focus{box-shadow:4px 4px 0 var(--pink-deep)}
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:22px auto 0;max-width:900px}
.chip{background:transparent;border:3px solid var(--pink);color:var(--fg);border-radius:999px;
  padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.15s}
.chip:hover{background:rgba(255,45,120,.18)}
.chip.active{background:var(--pink);color:#fff;box-shadow:3px 3px 0 #000}
.category-section{margin:44px 0 0}
.category-header{display:flex;align-items:center;gap:12px;border-bottom:2px solid rgba(255,253,231,.12);padding-bottom:12px}
.category-icon-wrap{width:34px;height:34px;display:grid;place-items:center;background:rgba(217,119,87,.16);border-radius:8px}
.category-title{font-size:clamp(1.15rem,4vw,1.4rem);font-weight:800;flex:1}
.category-count{background:var(--yellow);color:#000;border:2px solid #000;border-radius:6px;padding:2px 9px;font-weight:800;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:20px}
.skill-card{background:var(--card);color:#1a0a2e;border:3px solid #000;border-radius:6px;box-shadow:5px 5px 0 #000;
  padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.skill-card:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 #000}
.card-top{display:flex;gap:12px;align-items:flex-start}
.card-icon{flex-shrink:0;width:34px;height:34px}
.card-name{font-weight:800;font-size:15px;line-height:1.2}
.card-command{color:var(--pink-deep);font-weight:700;font-size:13px;font-family:ui-monospace,monospace}
.card-desc{font-size:13.5px;line-height:1.45;color:#3a2a4a;flex:1}
.card-bottom{display:flex;justify-content:space-between;align-items:center;border-top:2px solid rgba(0,0,0,.1);padding-top:10px}
.card-source{font-size:11px;color:#6a5a7a;font-weight:600}
.card-tag{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:2px solid #000}
.type-skill{background:var(--pink);color:#fff}
.type-command{background:var(--yellow);color:#000}
.empty{text-align:center;padding:60px 20px;color:rgba(255,253,231,.6)}
.error-box{max-width:620px;margin:40px auto;background:var(--card);color:#1a0a2e;border:3px solid #000;box-shadow:5px 5px 0 #000;border-radius:6px;padding:24px;line-height:1.5}
.error-box code{background:#1a0a2e;color:var(--yellow);padding:2px 6px;border-radius:4px;font-size:13px}
@media (max-width:640px){
  .container{padding:0 14px}
  header{padding:20px 0 0}
  h1{text-shadow:3px 3px 0 #000}
  .stats{gap:16px}
  .search-wrap{margin:24px auto 0}
  #search{font-size:16px} /* prevents iOS auto-zoom on tap */
  .filters{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;justify-content:flex-start;padding:0 14px 6px;margin:22px -14px 0;max-width:none;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{padding:8px 14px;font-size:12px;flex-shrink:0}
  .grid{grid-template-columns:1fr;gap:14px}
  .category-section{margin:32px 0 0}
  .skill-card{box-shadow:4px 4px 0 #000}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="container">
    <div class="claude-logo">
      <svg class="claude-sparkle" viewBox="0 0 24 24" fill="#D97757" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l1.8 6.2L20 6l-4.2 4.8L22 12l-6.2 1.2L20 18l-6-2.2L12 22l-1.8-6.2L4 18l4.2-4.8L2 12l6.2-1.2L4 6l6 2.2z"/></svg>
      <span>Claude Cowork</span>
    </div>
    <div class="badge"><span class="badge-dot"></span><span id="refreshDate">Refreshed</span></div>
    <h1>My <em>Skills</em> Dashboard</h1>
    <p class="subtitle">Every skill and slash command installed on your Claude Cowork setup, in one place. Search, filter, or tap any card to see how to trigger it.</p>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stTotal">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="stSkills">0</div><div class="stat-label">Skills</div></div>
      <div class="stat"><div class="stat-num" id="stCmd">0</div><div class="stat-label">Commands</div></div>
      <div class="stat"><div class="stat-num" id="stCat">0</div><div class="stat-label">Categories</div></div>
    </div>
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fffde7" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
      <input id="search" type="text" placeholder="Search skills, commands, descriptions...">
    </div>
    <div class="filters" id="filters"></div>
  </div>
</header>
<main class="container" id="content"></main>
<script>
const CATEGORY_ICONS = {
  "System & Tools":'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z"></path></svg>',
  "Automation":'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>',
  "Research & Strategy":'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>',
  "Communication":'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>',
  "Productivity":'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09Z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"></path></svg>',
  "Design & Visuals":'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"><circle cx="13.5" cy="6.5" r=".5" fill="#D97757"></circle><circle cx="17.5" cy="10.5" r=".5" fill="#D97757"></circle><circle cx="8.5" cy="7.5" r=".5" fill="#D97757"></circle><circle cx="6.5" cy="12.5" r=".5" fill="#D97757"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>'
};
const STAR = '<svg viewBox="0 0 24 24" fill="#D97757" xmlns="http://www.w3.org/2000/svg" width="32" height="32"><path d="M12 2l1.8 6.2L20 6l-4.2 4.8L22 12l-6.2 1.2L20 18l-6-2.2L12 22l-1.8-6.2L4 18l4.2-4.8L2 12l6.2-1.2L4 6l6 2.2z"/></svg>';
const CATEGORY_ORDER = ["System & Tools","Automation","Research & Strategy","Communication","Productivity","Design & Visuals"];
const esc = s => String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let SKILLS=[], activeFilter='All', query='';
function setDate(iso){
  const d = (iso && iso!=='auto') ? new Date(iso) : new Date();
  const txt = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('refreshDate').textContent = 'Refreshed '+txt;
}
function computeStats(){
  document.getElementById('stTotal').textContent = SKILLS.length;
  document.getElementById('stSkills').textContent = SKILLS.filter(s=>(s.type||'skill')==='skill').length;
  document.getElementById('stCmd').textContent = SKILLS.filter(s=>s.type==='command').length;
  document.getElementById('stCat').textContent = new Set(SKILLS.map(s=>s.category)).size;
}
function buildFilters(){
  const cats = CATEGORY_ORDER.filter(c=>SKILLS.some(s=>s.category===c));
  const all = ['All',...cats];
  document.getElementById('filters').innerHTML = all.map(c=>
    '<button class="chip'+(c===activeFilter?' active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>').join('');
  document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{activeFilter=b.dataset.cat;buildFilters();render();});
}
function cardHTML(s){
  const tag = (s.type||'skill')==='command'?'type-command':'type-skill';
  return '<div class="skill-card"><div class="card-top"><div class="card-icon">'+STAR+
    '</div><div><div class="card-name">'+esc(s.name)+'</div><div class="card-command">'+esc(s.command)+
    '</div></div></div><div class="card-desc">'+esc(s.description)+'</div>'+
    '<div class="card-bottom"><span class="card-source">'+esc(s.source)+'</span>'+
    '<span class="card-tag '+tag+'">'+esc(s.type||'skill')+'</span></div></div>';
}
function render(){
  const q = query.trim().toLowerCase();
  let list = SKILLS.filter(s=>activeFilter==='All'||s.category===activeFilter);
  if(q) list = list.filter(s=>(s.name+' '+s.command+' '+s.description+' '+s.category).toLowerCase().includes(q));
  const content = document.getElementById('content');
  if(!list.length){content.innerHTML='<div class="empty">No skills match your search.</div>';return;}
  const cats = CATEGORY_ORDER.filter(c=>list.some(s=>s.category===c));
  content.innerHTML = cats.map(c=>{
    const items = list.filter(s=>s.category===c);
    return '<section class="category-section"><div class="category-header">'+
      '<div class="category-icon-wrap">'+(CATEGORY_ICONS[c]||'')+'</div>'+
      '<div class="category-title">'+esc(c)+'</div>'+
      '<span class="category-count">'+items.length+'</span></div>'+
      '<div class="grid">'+items.map(cardHTML).join('')+'</div></section>';
  }).join('');
}
function boot(data){
  SKILLS = Array.isArray(data.skills)?data.skills:[];
  setDate(data.lastUpdated);
  computeStats(); buildFilters(); render();
  document.getElementById('search').addEventListener('input',e=>{query=e.target.value;render();});
}
fetch('skills.json',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(boot)
  .catch(err=>{
    document.getElementById('content').innerHTML =
      '<div class="error-box"><strong>Couldn\'t load your skills list.</strong><br><br>'+
      'Make sure <code>skills.json</code> is in the same folder as this page. '+
      'If you opened this file directly (file://), some browsers block reading the list — '+
      'running a tiny local server fixes it. The page is working; it just needs the list.<br><br>'+
      '<small>Details: '+esc(err.message)+'</small></div>';
    setDate();
  });
</script>
</body>
</html>
